name: Build Coder Workspace Images

on:
  push:
    branches: [ "main" ]
  # Allows you to trigger this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  # ==========================================
  # 1. Prepare Job (Runs Once)
  # ==========================================
  prepare:
    name: Fetch Global Build Args
    runs-on: ubuntu-latest
    outputs:
      nvm_version: ${{ steps.get-nvm.outputs.version }}
    steps:
      - name: Get Latest NVM Tag
        id: get-nvm
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch once using the pre-installed GitHub CLI
          LATEST_NVM_TAG=$(gh api repos/nvm-sh/nvm/releases/latest --jq '.tag_name')
          
          if [ -z "$LATEST_NVM_TAG" ]; then
            echo "Error: Could not fetch the latest release tag for NVM from GitHub."
            exit 1
          fi
          
          echo "Discovered NVM version: $LATEST_NVM_TAG"
          echo "version=$LATEST_NVM_TAG" >> "$GITHUB_OUTPUT"

  # ==========================================
  # 2. Build Matrix Job (Runs per flavor)
  # ==========================================
  build:
    name: Build & Push
    needs: prepare # Wait for the prepare job to finish
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavor: [base, desktop, node, golang]
        
    # Grant permissions needed to push to GHCR
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # Generate tags like: golang, golang-latest, golang-1bcd8af
          tags: |
            type=raw,value=${{ matrix.flavor }}
            type=raw,value=${{ matrix.flavor }}-latest
            type=sha,prefix=${{ matrix.flavor }}-

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            ENV_FLAVOR=${{ matrix.flavor }}
            NVM_VERSION=${{ needs.prepare.outputs.nvm_version }}
